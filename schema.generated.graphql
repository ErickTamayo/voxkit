  CATEGORY
  CREATED_AT
  DELIVERY_DEADLINE
  PROJECT_TITLE
  SESSION_DATE
  STATUS
  UPDATED_AT
}

"Dynamic WHERE conditions for the `where` argument of the query `jobs`."
input AgentJobsWhereWhereConditions {
  "A set of conditions that requires all conditions to match."
  AND: [AgentJobsWhereWhereConditions!]

  "Check whether a relation exists. Extra conditions or a minimum amount can be applied."
  HAS: AgentJobsWhereWhereConditionsRelation

  "A set of conditions that requires at least one condition to match."
  OR: [AgentJobsWhereWhereConditions!]

  "The column that is used for the condition."
  column: AgentJobsWhereColumn

  "The operator that is used for the condition."
  operator: SQLOperator = EQ

  "The value that is used for the condition."
  value: Mixed
}

"Dynamic WHERE HAS conditions for the `where` argument of the query `jobs`."
input AgentJobsWhereWhereConditionsHasCondition {
  "A set of conditions that requires all conditions to match."
  AND: [AgentJobsWhereWhereConditionsHasCondition!]

  "Check whether a relation exists. Extra conditions or a minimum amount can be applied."
  HAS: AgentJobsWhereWhereConditionsRelation

  "A set of conditions that requires at least one condition to match."
  OR: [AgentJobsWhereWhereConditionsHasCondition!]

  "The column that is used for the condition."
  column: String

  "The operator that is used for the condition."
  operator: SQLOperator = EQ

  "The value that is used for the condition."
  value: Mixed
}

"Dynamic HAS conditions for WHERE conditions for the `where` argument of the query `jobs`."
input AgentJobsWhereWhereConditionsRelation {
  "The amount to test."
  amount: Int = 1

  "Additional condition logic."
  condition: AgentJobsWhereWhereConditionsHasCondition

  "The comparison operator to test against the amount."
  operator: SQLOperator = GTE

  "The relation that is checked."
  relation: String!
}

