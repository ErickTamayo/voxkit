mutation RequestAuthenticationCode($input: RequestAuthenticationCodeInput!) {
    requestAuthenticationCode(input: $input) {
        __typename
        ... on RequestAuthenticationCodeSuccess {
            message
        }
        ... on AuthenticationRateLimitError {
            message
            retry_after_seconds
        }
    }
}

mutation AuthenticateWithCode($input: AuthenticateWithCodeInput!) {
    authenticateWithCode(input: $input) {
        __typename
        ... on AuthenticateWithCodeSessionSuccess {
            message
        }
        ... on AuthenticateWithCodeTokenSuccess {
            message
            token
        }
        ... on AuthenticateWithCodeInvalidCodeError {
            message
        }
        ... on AuthenticationRateLimitError {
            message
            retry_after_seconds
        }
    }
}

mutation Logout {
    logout {
        message
    }
}
