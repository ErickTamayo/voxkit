"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

"Authentication mode for code-based login."
enum AuthMode {
    "Establish a server session for the client."
    SESSION

    "Return a bearer token in the response."
    TOKEN
}

"Indicates what fields are available at the top level of a query operation."
type Query {
    "Return the currently authenticated user."
    me: User! @guard @auth
}

"Indicates what fields are available at the top level of a mutation operation."
type Mutation {
    "Request a sign-in code for an email address."
    requestAuthenticationCode(input: RequestAuthenticationCodeInput! @spread): RequestAuthenticationCodeResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\AuthCodeMutations@requestAuthenticationCode")

    "Verify a sign-in code and create a session or token."
    authenticateWithCode(input: AuthenticateWithCodeInput! @spread): AuthenticateWithCodeResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\AuthCodeMutations@authenticateWithCode")

    "Log out the currently authenticated session or token."
    logout: LogoutResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\AuthCodeMutations@logout")
}

"Input for requesting an authentication code."
input RequestAuthenticationCodeInput {
    "Email address to receive the authentication code."
    email: String! @rules(apply: ["required", "email", "max:255"])
}

"Input for verifying an authentication code."
input AuthenticateWithCodeInput {
    "Email address that requested the authentication code."
    email: String! @rules(apply: ["required", "email", "max:255"])

    "6-digit numeric authentication code."
    code: String! @rules(apply: ["required", "regex:/^\\d{6}$/"])

    "Auth mode that determines token vs session behavior."
    mode: AuthMode

    "Optional device label for token creation."
    device_name: String @rules(apply: ["sometimes", "string", "max:255"])
}

"Response for requesting an authentication code."
type RequestAuthenticationCodeResponse {
    ok: Boolean!
    message: String
}

"Response for authenticating with an authentication code."
type AuthenticateWithCodeResponse {
    ok: Boolean!
    message: String
    token: String
}

"Response for logging out."
type LogoutResponse {
    ok: Boolean!
    message: String
}

"Account of a person who uses this application."
type User {
    "Unique primary key."
    id: ID!

    "Non-unique name."
    name: String!

    "Unique email address."
    email: String!

    "When the email was verified."
    email_verified_at: DateTime

    "When the account was created."
    created_at: DateTime!

    "When the account was last updated."
    updated_at: DateTime!
}
