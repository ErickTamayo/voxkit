# --------------------------------------------------
# Types
# --------------------------------------------------

"Client type enum"
enum ClientType {
    "Individual"
    INDIVIDUAL @enum(value: "individual")

    "Company"
    COMPANY @enum(value: "company")
}

"Client details"
type Client {
    "Unique primary key (ULID)"
    id: ULID!

    "Client type"
    type: ClientType!

    "Industry"
    industry: String

    "Payment terms"
    payment_terms: String

    "When the client was created"
    created_at: Timestamp!

    "When the client was last updated"
    updated_at: Timestamp!

    "The contact record for this client"
    contact: Contact @morphOne
}

"Input for creating a client"
input CreateClientInput {
    type: ClientType!
    industry: String
    payment_terms: String
}

"Input for updating a client"
input UpdateClientInput {
    type: ClientType
    industry: String
    payment_terms: String
}


# --------------------------------------------------
# Queries
# --------------------------------------------------

extend type Query {
    "Get a single client by ID"
    client(id: ULID! @eq): Client @find @guard

    "List all clients for authenticated user"
    clients(first: Int = 20, page: Int): [Client!]!
        @paginate(defaultCount: 20, scopes: ["forUser"])
        @guard
}


# --------------------------------------------------
# Mutations
# --------------------------------------------------

extend type Mutation {
    "Create a new client"
    createClient(input: CreateClientInput! @spread): Client!
        @create
        @guard

    "Update a client"
    updateClient(id: ULID!, input: UpdateClientInput! @spread): Client
        @guard
        @canFind(ability: "update", find: "id", action: RETURN_VALUE, returnValue: null)
        @update

    "Delete a client"
    deleteClient(id: ULID! @whereKey): Client
        @guard
        @canFind(ability: "delete", find: "id", action: RETURN_VALUE, returnValue: null)
        @delete
}


