services:
  typesense:
    image: typesense/typesense:30.1
    container_name: voxkit-typesense
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY:-xyz}
      --enable-cors
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    restart: unless-stopped

volumes:
  typesense-data:
